<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureYoga · 登录</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F2EDE4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #FBF7F0;
    border-radius: 20px;
    border: 1px solid #DDD3BA;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .logo {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid #C9A84C;
    margin: 0 auto 1.2rem;
    display: block;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #3B3127;
    font-family: serif;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 11px;
    color: #C9A84C;
    letter-spacing: 3px;
    margin-top: 4px;
    margin-bottom: 2rem;
  }
  .error-msg {
    background: #FEE2E2;
    color: #991B1B;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }
  label {
    display: block;
    font-size: 12px;
    color: #7A6548;
    font-weight: 600;
    text-align: left;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid #CDBFA0;
    border-radius: 10px;
    background: #F7F2E8;
    color: #3D2B1F;
    outline: none;
    transition: border-color .15s;
    margin-bottom: 1.2rem;
  }
  input[type="password"]:focus {
    border-color: #8B7355;
    background: #fff;
  }
  button {
    width: 100%;
    padding: 13px;
    background: #4A3728;
    color: #F5EDD8;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  .divider {
    border: none;
    border-top: 1px solid #DDD3BA;
    margin: 1.6rem 0 1rem;
  }
  .footer-text {
    font-size: 11px;
    color: #A89270;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <img src="/logo.png" alt="PureYoga" class="logo">
  <h1>PURE YOGA</h1>
  <p class="subtitle">MEDITATION &amp; WELLNESS</p>

  <div class="error-msg" id="err">口令不正确，请重试</div>

  <form method="POST" action="/login">
    <label for="pwd">访问口令</label>
    <input type="password" id="pwd" name="password"
           placeholder="请输入口令" autocomplete="current-password" autofocus>
    <button type="submit">进入课程表</button>
  </form>

  <hr class="divider">
  <p class="footer-text">Pure Yoga · Meditation &amp; Wellness</p>
</div>

<script>
  if (new URLSearchParams(location.search).get('error') === '1') {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
